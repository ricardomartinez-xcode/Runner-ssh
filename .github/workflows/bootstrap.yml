name: Bootstrap SSH runner

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Verify and unpack the reviewed project archive
        run: |
          echo "ee01611726878f8660f10ed6222900a51a39d540e9ce088312d9037758b9f82d  .bootstrap/runner-ssh.tar.gz" | sha256sum -c -
          tar -xzf .bootstrap/runner-ssh.tar.gz
      - name: Commit runner source
        run: |
          rm -rf .bootstrap .github/workflows/bootstrap.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add OAuth-protected SSH task runner"
          git push
