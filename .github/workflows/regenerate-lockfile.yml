name: Regenerate lockfile

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Regenerate reproducible lockfile
        run: |
          rm -f package-lock.json
          npm install --package-lock-only --ignore-scripts --include=dev
      - name: Commit lockfile
        run: |
          git rm -f .github/workflows/regenerate-lockfile.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: regenrate lockfile"
          git push
