name: Diagnose CI

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run diagnostics
        run: |
          set +e
          npm install > /tmp/npm-install.log 2>&1
          install_status=$?
          npm run check > /tmp/typecheck.log 2>&1
          check_status=$?
          npm test > /tmp/test.log 2>&1
          test_status=$?
          set -e

          {
            echo "# CI diagnosis"
            echo
            echo "npm install: $install_status"
            echo "npm run check: $check_status"
            echo "npm test: $test_status"
            echo
            echo "## npm install"
            cat /tmp/npm-install.log
            echo
            echo "## npm run check"
            cat /tmp/typecheck.log
            echo
            echo "## npm test"
            cat /tmp/test.log
          } > ci-diagnostic.md

      - name: Commit diagnostic report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci-diagnostic.md
          git commit -m "chore: add temporary CI diagnosis"
          git push
