name: Remove temporary CI diagnostics

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Remove temporary diagnostic artifacts
        run: |
          git rm -f ci-diagnostic.md .github/workflows/diagnose-ci.yml .github/workflows/cleanup-ci.yml || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --cached --quiet || git commit -m "chore: remove temporary CI diagnostics"
          git push
