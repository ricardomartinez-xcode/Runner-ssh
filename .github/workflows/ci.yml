name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies from manifest
        run: npm install --no-package-lock --ignore-scripts --include=prod --include=dev
      - name: Verify runtime modules
        run: node -e "for (const packageName of ['fastify', 'jose', 'yaml', 'zod']) {require.resolve(packageName)}"
      - run: npm run check
      - run: npm test
      - name: Build production Docker image
        run: docker build --no-cache -t runner-ssh:ci .
