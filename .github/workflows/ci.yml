name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --include=dev
      - run: npm install --no-save fastify@^5.2.0 jose@^5.10.0 yaml@^2.7.0 zod@^3.24.0
      - run: npm run check
      - run: npm test
