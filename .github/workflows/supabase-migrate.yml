name: Apply Supabase migrations

on:
  workflow_dispatch:
    inputs:
      example_input:
        description: 'Escribe MIGRAR para aplicar migraciones pendientes a producción'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: supabase-production-migrations
  cancel-in-progress: false

jobs:
  migrate:
    if: ${{ inputs.example_input == 'MIGRAR' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: hmhmhpyksqufclqzjkxo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SUPABASE_ACCESS_TOKEN:-}" || { echo "::error::Missing SUPABASE_ACCESS_TOKEN"; exit 1; }
          test -n "${SUPABASE_DB_PASSWORD:-}" || { echo "::error::Missing SUPABASE_DB_PASSWORD"; exit 1; }

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.84.2

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Show migration status before
        run: supabase migration list --linked

      - name: Apply all pending migrations
        run: supabase db push --linked --include-all

      - name: Show migration status after
        run: supabase migration list --linked
