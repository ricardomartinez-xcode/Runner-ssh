services:
  - type: web
    name: relead-ops-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: false
    disk:
      name: relead-ops-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATA_DIR
        value: /var/data
      - key: RUNNER_CONFIG_PATH
        value: /app/config/runner.yaml
      - key: AUTH_MODE
        value: oidc
      - key: OIDC_ISSUER_URL
        sync: false
      - key: OIDC_JWKS_URL
        sync: false
      - key: OIDC_AUDIENCE
        sync: false
      - key: OIDC_REQUIRED_SCOPE
        value: runner:ssh
      - key: OIDC_ROLE_CLAIMS
        value: roles,org_role
      - key: RUNNER_API_TOKEN_SHA256
        sync: false
      - key: RUNNER_API_TOKEN_ROLES
        value: runner.operator
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SSH_KEY_ENCRYPTION_SECRET
        sync: false
      - key: OP_SERVICE_ACCOUNT_TOKEN
        sync: false
