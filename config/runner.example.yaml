version: 1

# This file is trusted deployment configuration. GPT Actions cannot submit
# commands, hosts, users, credentials or secret references.
collections:
  repository:
    description: "Safe repository checks for an existing development environment."
    required_roles: ["runner.operator"]
    tasks:
      repo.status:
        description: "Show the Git working tree status."
        argv: ["git", "status", "--short"]
        timeout_seconds: 30
      repo.lint:
        description: "Run the repository lint script."
        argv: ["npm", "run", "lint"]
        timeout_seconds: 180
      repo.typecheck:
        description: "Run static TypeScript checks."
        argv: ["npm", "run", "check"]
        timeout_seconds: 180
      repo.test:
        description: "Run the repository test suite."
        argv: ["npm", "test"]
        timeout_seconds: 300
      repo.build:
        description: "Build the repository."
        argv: ["npm", "run", "build"]
        timeout_seconds: 300

  system:
    description: "Narrow server checks delegated to a target-local allowlist wrapper."
    required_roles: ["runner.operator"]
    tasks:
      system.info:
        description: "Show non-sensitive system information."
        argv: ["/usr/local/bin/runner-task", "system-info"]
        timeout_seconds: 30
      service.status:
        description: "Check an approved service status."
        argv: ["/usr/local/bin/runner-task", "service-status"]
        timeout_seconds: 45
      docker.ps:
        description: "List containers through the local wrapper."
        argv: ["/usr/local/bin/runner-task", "docker-ps"]
        timeout_seconds: 45

targets:
  releadserver-cloudflare:
    type: cloudflare_tunnel
    description: "Cloudflare Tunnel SSH placeholder. Replace before use."
    required_roles: ["runner.operator"]
    allowed_collections: ["repository"]
    working_directory: "/srv/replace-me"
    host: "ssh.relead.com.mx"
    port: 22
    username: "runner"
    known_hosts: "ssh.relead.com.mx ssh-ed25519 AAAA_REPLACE_WITH_REAL_HOST_KEY"
    auth:
      provider: env
      reference: "RELEADSERVER_SSH_CREDENTIAL"
      mode: private_key_password

  microserver-staging:
    type: ssh
    description: "Staging server placeholder. Replace before use."
    required_roles: ["runner.operator"]
    allowed_collections: ["repository", "system"]
    working_directory: "/srv/replace-me"
    host: "replace-me.example.com"
    port: 22
    username: "runner"
    known_hosts: "replace-me.example.com ssh-ed25519 AAAA_REPLACE_WITH_REAL_HOST_KEY"
    auth:
      provider: 1password
      reference: "op://runner-ssh-staging/microserver/private_key"
      mode: key
