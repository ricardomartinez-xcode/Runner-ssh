version: 1

# Trusted deployment configuration. GPT Actions can only choose one of these
# server-side allowlisted targets, collections, and tasks.
collections:
  repository:
    description: "Safe repository checks for the Runner-SSH Codespace."
    tasks:
      repo.status:
        description: "Show the Git working tree status."
        argv: ["git", "status", "--short"]
        timeout_seconds: 30
      repo.install:
        description: "Install dependencies from package-lock.json."
        argv: ["npm", "ci"]
        timeout_seconds: 300
      repo.typecheck:
        description: "Run static TypeScript checks."
        argv: ["npm", "run", "check"]
        timeout_seconds: 180
      repo.test:
        description: "Run the repository test suite."
        argv: ["npm", "test"]
        timeout_seconds: 300
      repo.build:
        description: "Build the repository."
        argv: ["npm", "run", "build"]
        timeout_seconds: 300

targets:
  runner-ssh-codespace:
    type: codespace
    description: "Runner-SSH GitHub Codespace on main."
    allowed_collections: ["repository"]
    working_directory: "/workspaces/Runner-ssh"
    codespace_name: "runner-ssh-jj64gvwvxwjr2q9j9"
    github_token:
      provider: env
      reference: "RUNNER_GITHUB_TOKEN"
