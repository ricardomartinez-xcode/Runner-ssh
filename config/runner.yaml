version: 1

# Trusted deployment configuration. GPT Actions can only choose one of these
# server-side allowlisted targets, collections, and tasks.
collections:
  repository:
    description: "Safe repository checks for a ReLead Ops SSH target."
    tasks:
      repo.status:
        description: "Show the Git working tree status."
        argv: ["git", "status", "--short"]
        timeout_seconds: 30
      repo.install:
        description: "Install dependencies from package-lock.json."
        argv: ["npm", "ci"]
        timeout_seconds: 300
      repo.typecheck:
        description: "Run static TypeScript checks."
        argv: ["npm", "run", "check"]
        timeout_seconds: 180
      repo.test:
        description: "Run the repository test suite."
        argv: ["npm", "test"]
        timeout_seconds: 300
      repo.build:
        description: "Build the repository."
        argv: ["npm", "run", "build"]
        timeout_seconds: 300

targets:
  releadserver-cloudflare:
    type: cloudflare_tunnel
    description: "ReleadServer over Cloudflare Tunnel. Replace host and known_hosts before enabling."
    allowed_collections: ["repository"]
    working_directory: "/home/ricardo/Runner-ssh"
    host: "ssh.relead.com.mx"
    port: 22
    username: "ricardo"
    known_hosts: "ssh.relead.com.mx ssh-ed25519 REPLACE_WITH_REAL_HOST_KEY"
    auth:
      provider: env
      reference: "RELEADSERVER_SSH_CREDENTIAL"
      mode: private_key_password
